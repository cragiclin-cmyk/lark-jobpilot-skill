<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPilot JD Grabber</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.warning {
      display: block;
      background: #fffbeb;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      color: #6b7280;
      font-size: 13px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .preview {
      margin-top: 16px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      color: #4b5563;
      max-height: 100px;
      overflow-y: auto;
      display: none;
    }

    .preview.show {
      display: block;
    }

    .preview-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    .preview-content {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .debug-zone {
      margin-top: 16px;
      padding: 12px;
      background: #1f2937;
      border-radius: 8px;
      display: none;
    }

    .debug-zone.show {
      display: block;
    }

    .debug-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: #f9fafb;
      font-size: 12px;
    }

    .debug-canvas-container {
      background: #374151;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      text-align: center;
    }

    .debug-canvas-container img {
      max-width: 100%;
      border-radius: 4px;
      background: white;
    }

    .debug-ocr-result {
      background: #111827;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #10b981;
      word-break: break-all;
    }

    .debug-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">JP</div>
      <div>
        <div class="title">JobPilot Grabber</div>
        <div class="subtitle">智能 JD 抓取 + OCR 薪资识别</div>
      </div>
    </div>

    <button id="grabBtn" class="btn btn-primary">
      <span>🎯</span>
      <span>一键抓取 JD</span>
    </button>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span id="loadingText">正在提取岗位信息...</span>
    </div>

    <div id="message" class="message"></div>

    <div id="preview" class="preview">
      <div class="preview-title">📋 提取预览：</div>
      <div id="previewContent" class="preview-content"></div>
    </div>

    <div id="debugZone" class="debug-zone">
      <div class="debug-title">🔍 OCR Debug 信息</div>
      <div class="debug-label">裁剪增强后的图像：</div>
      <div class="debug-canvas-container">
        <img id="debugImage" src="" alt="OCR Image">
      </div>
      <div class="debug-label">OCR 原始识别结果：</div>
      <div id="debugOcrResult" class="debug-ocr-result">-</div>
    </div>

    <div class="footer">
      Powered by JobPilot CLI Agent + Tesseract OCR
    </div>
  </div>

  <canvas id="ocrCanvas" style="display: none;"></canvas>
  <script src="tesseract.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
